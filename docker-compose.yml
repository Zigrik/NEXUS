services:
  nexus:
    build: .
    container_name: nexus
    restart: unless-stopped
    ports:
      - "8443:8443"
      - "9000:9000"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./web:/app/web:ro
      - ./certs:/app/certs:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    environment:
      - TZ=UTC
    healthcheck:
      test: ["CMD", "curl", "-f", "https://localhost:8443/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"