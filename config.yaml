control:
  host: "0.0.0.0"
  port: 9000
  heartbeat_interval: 30
  heartbeat_timeout: 90

gateway:
  host: "0.0.0.0"
  port: 8080
  read_timeout: 30
  write_timeout: 30
  idle_timeout: 120

routes:
  - host: "app1.example.com"
    device_id: "raspberry-pi-1"
    target_port: 3000
  - host: "app2.example.com"
    device_id: "raspberry-pi-1"
    target_port: 8080

log:
  level: "info"
  encoding: "console"